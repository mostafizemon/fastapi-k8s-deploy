version: '3.8'

services:
  api:
    build: .
    ports:
      - "47823:47823"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - /dev/shm:/dev/shm  # Shared memory for Chrome
    shm_size: '2gb'  # Increase shared memory for Chrome stability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47823/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
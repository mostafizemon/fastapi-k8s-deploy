# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-scraper-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-scraper
  template:
    metadata:
      labels:
        app: python-scraper
    spec:
      containers:
        - name: app-container
          image: python-scraper:latest # ১. নামটা একদম হুবহু এমন করে দিন
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 47823
          # Chrome er shared memory issue fix korar jonno Volume
          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: python-scraper-svc
spec:
  type: NodePort
  selector:
    app: python-scraper
  ports:
    - protocol: TCP
      port: 47823
      targetPort: 47823
      nodePort: 30080 # Ei port diye apni baire theke access korben
